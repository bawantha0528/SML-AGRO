server.port=8081
spring.application.name=sml-agro-backend
# ===================================
# DATABASE CONNECTION (MySQL via XAMPP)
# ===================================
# This tells Spring to use the variables provided by Railway

spring.datasource.url=jdbc:mysql://mysql.railway.internal:3306/railway
spring.datasource.username=root
spring.datasource.password=ETfCIZGxV1XKgDchFhrVXBJkXiDLeOmA
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================
# JPA / HIBERNATE SETTINGS
# ===================================
# Keeps your tables updated based on your schema
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ===================================
# CONNECTION POOL (HikariCP)
# ===================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ===================================
# WEB PERFORMANCE
# ===================================
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
server.compression.min-response-size=1024

spring.web.resources.cache.cachecontrol.max-age=365d
spring.web.resources.cache.cachecontrol.cache-public=true
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**

# ===================================
# LOGGING (to see SQL)
# ===================================
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF

# ===================================
# EMAIL SETTINGS (SMTP)
# ===================================
spring.mail.host=smtp.gmail.com
